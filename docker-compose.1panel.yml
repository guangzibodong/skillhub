name: skillhub

services:
  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://useskillhub.com}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.useskillhub.com}
        SKILLHUB_SERVER_API_URL: ${SKILLHUB_SERVER_API_URL:-https://api.useskillhub.com}
    container_name: skillhub-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SKILLHUB_ENV: production
      SKILLHUB_ACCESS_LOG_PATHS: /var/log/skillhub/useskillhub/access.log,/var/log/skillhub/www.useskillhub/access.log
      SKILLHUB_ANALYTICS_TIME_ZONE: Asia/Shanghai
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://useskillhub.com}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.useskillhub.com}
      SKILLHUB_SERVER_API_URL: ${SKILLHUB_SERVER_API_URL:-https://api.useskillhub.com}
      SKILLHUB_AUTH_CALLBACK_BASE_URL: ${SKILLHUB_AUTH_CALLBACK_BASE_URL:-https://api.useskillhub.com}
    volumes:
      - /opt/1panel/www/sites/useskillhub.com/log:/var/log/skillhub/useskillhub:ro
      - /opt/1panel/www/sites/www.useskillhub.com/log:/var/log/skillhub/www.useskillhub:ro
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - api
    networks:
      - skillhub

  api:
    build:
      context: .
      dockerfile: deploy/docker/gateway.Dockerfile
    container_name: skillhub-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SKILLHUB_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://useskillhub.com}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.useskillhub.com}
      SKILLHUB_AUTH_CALLBACK_BASE_URL: ${SKILLHUB_AUTH_CALLBACK_BASE_URL:-https://api.useskillhub.com}
      DATABASE_URL: postgres://skillhub:${POSTGRES_PASSWORD}@postgres:5432/skillhub
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:18787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - skillhub

  postgres:
    image: postgres:16-bookworm
    container_name: skillhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillhub
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - skillhub-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d skillhub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skillhub

  redis:
    image: redis:7-bookworm
    container_name: skillhub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - skillhub-redis:/data
    networks:
      - skillhub

volumes:
  skillhub-postgres:
  skillhub-redis:

networks:
  skillhub:
    name: skillhub
